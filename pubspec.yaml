name: nebula_code
description: Puzzle espacial casual - Cosmo & Luna
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  flame_audio: ^2.1.1
  flame_forge2d: ^0.18.0
  google_mobile_ads: ^5.1.0
  firebase_core: ^3.0.0
  firebase_analytics: ^11.0.0
  flutter_animate: ^4.5.0
  shared_preferences: ^2.2.3
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/cosmo/
    - assets/images/luna/
    - assets/images/pieces/
    - assets/images/backgrounds/
    - assets/images/galaxia_fondo/
    - assets/images/ui/
    - assets/audio/music/
    - assets/audio/sfx/
